services:
  - type: web
    name: trendbrain-core
    env: node
    plan: starter
    buildCommand: npm ci && npm run deploy:build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: trendbrain-postgres
          property: connectionString
      - key: ADMIN_API_TOKEN
        generateValue: true
      - key: DISABLE_CRON
        value: false
      - key: PYTHON_BIN
        value: python

databases:
  - name: trendbrain-postgres
    plan: starter
    databaseName: trendbrain_core
    user: trendbrain
